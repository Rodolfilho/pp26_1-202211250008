plugins {
    id 'java'
}

group = 'com.debate'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Para seus testes e execuções padrão
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

sourceSets {
    main {
        java {
            srcDirs = ['.']
        }
    }
}